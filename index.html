<html lang="ru">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a12; --card-bg: #13131f; --card-border: #2a2a3a;
  --text: #e8e0f0; --muted: #7a7090;
  --common: #4caf80; --rare: #4a9eff; --epic: #9d7ff0;
  --legendary: #f0a030; --mythic: #ff44ff;
}
body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 1.5rem 1rem; gap: 1.25rem; overflow-x: hidden;
}
h1 { font-size: 22px; font-weight: 700; text-align: center; letter-spacing: 0.05em; }
.sub { font-size: 13px; color: var(--muted); text-align: center; margin-top: 4px; }
.rarities { display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; }
.rpill { font-size: 10px; padding: 2px 9px; border-radius: 99px; font-weight: 700; }
.rpill.common    { background:#0d2e1f; color:var(--common); border:1px solid var(--common); }
.rpill.rare      { background:#0d1e3a; color:var(--rare); border:1px solid var(--rare); }
.rpill.epic      { background:#1a1030; color:var(--epic); border:1px solid var(--epic); }
.rpill.legendary { background:#2a1800; color:var(--legendary); border:1px solid var(--legendary); }
.rpill.mythic    { background:#1a0020; color:var(--mythic); border:1px solid var(--mythic); }
.card-area { width:280px; height:340px; position:relative; display:flex; align-items:center; justify-content:center; }
.card-back {
  width:260px; height:320px; border-radius:20px;
  background:var(--card-bg); border:1px solid var(--card-border);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px;
  cursor:pointer; transition:transform 0.15s, border-color 0.2s; position:absolute;
}
.card-back:hover { transform:scale(1.02); border-color:#5a5a7a; }
.card-back:active { transform:scale(0.97); }
.card {
  width:260px; height:320px; border-radius:20px;
  background:var(--card-bg); border:1px solid var(--card-border);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:10px; padding:1.5rem; position:absolute; opacity:0; transform:scale(0.8) rotate(-5deg);
}
.card.reveal { animation:popIn 0.5s cubic-bezier(.34,1.56,.64,1) forwards; }
@keyframes popIn { from{opacity:0;transform:scale(0.7) rotate(-8deg);}to{opacity:1;transform:scale(1) rotate(0deg);} }
.card.mythic-card { background:#050010; border:1.5px solid var(--mythic); box-shadow:0 0 24px 4px #ff00cc55,0 0 60px 10px #7700ff22,inset 0 0 30px #1a003388; }
.card.legendary-card { border:1.5px solid var(--legendary); box-shadow:0 0 16px 2px #f0a03044; }
.card.epic-card { border:1.5px solid var(--epic); }
.card.rare-card  { border:1.5px solid var(--rare); }
.creature-circle { width:110px; height:110px; border-radius:50%; background:#1a1a28; border:1px solid var(--card-border); display:flex; align-items:center; justify-content:center; font-size:60px; flex-shrink:0; }
.mythic-card .creature-circle { background:#0d0020; border-color:var(--mythic); box-shadow:0 0 18px #ff00cc88; filter:drop-shadow(0 0 10px #ff44ff); }
.legendary-card .creature-circle { border-color:var(--legendary); background:#1a1000; }
.epic-card .creature-circle { border-color:var(--epic); background:#100d22; }
.rare-card .creature-circle { border-color:var(--rare); background:#0a1020; }
.name { font-size:17px; font-weight:700; color:var(--text); text-align:center; }
.mythic-card .name { color:#ff88ff; text-shadow:0 0 10px #ff00ff,0 0 24px #cc00ff; }
.legendary-card .name { color:var(--legendary); }
.epic-card .name { color:#b8b0ff; }
.rare-card .name { color:#88ccff; }
.desc { font-size:12px; color:var(--muted); text-align:center; line-height:1.6; }
.mythic-card .desc { color:#cc88ff; }
.badge { font-size:10px; padding:3px 12px; border-radius:99px; font-weight:700; letter-spacing:0.04em; }
.badge.common    { background:#0d2e1f; color:var(--common); border:1px solid var(--common); }
.badge.rare      { background:#0d1e3a; color:var(--rare); border:1px solid var(--rare); }
.badge.epic      { background:#1a1030; color:var(--epic); border:1px solid var(--epic); }
.badge.legendary { background:#2a1800; color:var(--legendary); border:1px solid var(--legendary); }
.badge.mythic    { background:#1a0020; color:var(--mythic); border:1px solid var(--mythic); text-shadow:0 0 8px #ff00ff; box-shadow:0 0 10px #ff00cc44; }
.btn { padding:12px 30px; border-radius:12px; border:1px solid #3a3a5a; background:#1a1a2e; color:var(--text); font-size:14px; font-weight:600; cursor:pointer; font-family:'Nunito',sans-serif; transition:all 0.15s; }
.btn:hover { background:#2a2a4a; border-color:#6a6a9a; }
.btn:active { transform:scale(0.97); }
.hint { font-size:12px; color:var(--muted); text-align:center; }
.counter { font-size:11px; color:#4a4060; text-align:center; max-width:320px; }
.sparkle { position:absolute; pointer-events:none; font-size:16px; animation:fly 1s ease-out forwards; opacity:0; }
@keyframes fly { 0%{opacity:1;transform:translate(0,0) scale(1.2);}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0.1);} }
.neon-scan { position:absolute; width:100%; height:2px; background:linear-gradient(90deg,transparent,#ff00ff88,transparent); animation:scan 2s linear infinite; top:0; left:0; border-radius:20px; pointer-events:none; }
@keyframes scan { 0%{top:0;opacity:0.8;}50%{opacity:1;}100%{top:100%;opacity:0;} }
</style>
</head>
<body>
<h1>✦ Pusheen Shop ✦</h1>
<p class="sub">Какое существо выберет тебя? 🌑</p>
<div class="rarities">
  <span class="rpill common">обычный 40%</span>
  <span class="rpill rare">редкий 30%</span>
  <span class="rpill epic">эпик 18%</span>
  <span class="rpill legendary">легенд 9%</span>
  <span class="rpill mythic">✦✦ мистик 3%</span>
</div>
<div class="card-area" id="cardArea">
  <div class="card-back" id="cardBack" onclick="reveal()">
    <div style="font-size:64px">🌑</div>
    <p style="font-size:13px;color:var(--muted)">нажми, чтобы призвать</p>
  </div>
  <div class="card" id="resultCard">
    <div class="creature-circle"><span id="adoptEmoji"></span></div>
    <div class="name" id="adoptName"></div>
    <div class="desc" id="adoptDesc"></div>
    <span class="badge" id="adoptRarity"></span>
  </div>
</div>
<div style="display:flex;gap:10px;align-items:center">
  <button class="btn" id="againBtn" style="display:none" onclick="reset()">ещё раз</button>
  <button class="btn" id="rollBtn" onclick="reveal()">призвать 🌑</button>
</div>
<p class="hint" id="hintText">100 мистических существ · 5 уровней силы</p>
<p class="counter" id="counter"></p>

  {e:"💫",n:"Пушин Богов",d:"Появляется раз в вечность.\nЕсли видишь его — ты избран.\nИли проклят.",r:"mythic"},
];
const rarityLabel={common:"обычный",rare:"редкий",epic:"★ эпик",legendary:"✦ легендарный",mythic:"✦✦ мистик"};
const weights={common:40,rare:30,epic:18,legendary:9,mythic:3};
let rolls=0,revealed=false,stats={common:0,rare:0,epic:0,legendary:0,mythic:0};
function weightedPick(){
  const total=Object.values(weights).reduce((a,b)=>a+b,0);
  let r=Math.random()*total;
  for(const rarity in weights){r-=weights[rarity];if(r<=0){const pool=adopts.filter(a=>a.r===rarity);return pool[Math.floor(Math.random()*pool.length)];}}
  return adopts[0];
}
function reveal(){
  if(revealed)return;revealed=true;rolls++;
  const adopt=weightedPick();stats[adopt.r]++;
  document.getElementById("adoptEmoji").textContent=adopt.e;
  document.getElementById("adoptName").textContent=adopt.n;
  document.getElementById("adoptDesc").textContent=adopt.d;
  const rar=document.getElementById("adoptRarity");rar.textContent=rarityLabel[adopt.r];rar.className="badge "+adopt.r;
  const card=document.getElementById("resultCard");card.className="card";
  if(adopt.r==="mythic")card.classList.add("mythic-card");
  else if(adopt.r==="legendary")card.classList.add("legendary-card");
  else if(adopt.r==="epic")card.classList.add("epic-card");
  else if(adopt.r==="rare")card.classList.add("rare-card");
  if(adopt.r==="mythic"){const s=document.createElement("div");s.className="neon-scan";card.appendChild(s);setTimeout(()=>s.remove(),4000);}
  document.getElementById("cardBack").style.display="none";
  document.getElementById("rollBtn").style.display="none";
  card.classList.add("reveal");
  const area=document.getElementById("cardArea");
  const spe=adopt.r==="mythic"?["💜","🟣","⚡","✦","💫"]:adopt.r==="legendary"?["⭐","🌟","✨","💛"]:adopt.r==="epic"?["💜","✨","🌸","⚡"]:["🌸","✨","🐾","🌿"];
  const cnt=adopt.r==="mythic"?20:adopt.r==="legendary"?12:adopt.r==="epic"?8:5;
  for(let i=0;i<cnt;i++){const sp=document.createElement("div");sp.className="sparkle";sp.textContent=spe[Math.floor(Math.random()*spe.length)];const angle=Math.random()*Math.PI*2,dist=60+Math.random()*90;sp.style.setProperty("--dx",Math.cos(angle)*dist+"px");sp.style.setProperty("--dy",Math.sin(angle)*dist+"px");sp.style.left=(140+Math.cos(angle)*15)+"px";sp.style.top=(170+Math.sin(angle)*15)+"px";sp.style.animationDelay=(i*0.06)+"s";area.appendChild(sp);setTimeout(()=>sp.remove(),1400);}
  document.getElementById("againBtn").style.display="inline-block";
  document.getElementById("hintText").textContent=adopt.r==="mythic"?"✦✦ МИСТИК. 3% шанс. Ты избран(а).":adopt.r==="legendary"?"✦ Легендарный! Невероятная удача!":adopt.r==="epic"?"★ Эпик! Очень редко!":"поделись с подругами 🐾";
  document.getElementById("counter").textContent=`роллов: ${rolls} · обычных: ${stats.common} · редких: ${stats.rare} · эпиков: ${stats.epic} · легенд: ${stats.legendary} · мистиков: ${stats.mythic}`;
}
function reset(){
  revealed=false;
  document.getElementById("cardBack").style.display="flex";
  document.getElementById("rollBtn").style.display="inline-block";
  document.getElementById("resultCard").className="card";
  document.getElementById("againBtn").style.display="none";
  document.getElementById("hintText").textContent="100 мистических существ · 5 уровней силы";
}
</script>
</body>
</html>

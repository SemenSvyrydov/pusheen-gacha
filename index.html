<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Pusheen Shop · Призови существо</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #120820;
  --card-bg: #1e0f35;
  --card-border: #6a2e90;
  --text: #f5e0fb;
  --muted: #c09ad8;
  --common: #7ae8b8;
  --rare: #90c8ff;
  --epic: #d890ff;
  --legendary: #ffd480;
  --mythic: #ff70cc;
}
body {
  font-family: 'Nunito', sans-serif;
  background: linear-gradient(155deg, #0e0820 0%, #1e0d38 45%, #0e0a1a 100%);
  color: var(--text);
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 1.5rem 1rem; gap: 1.25rem; overflow-x: hidden;
}
h1 { font-size: 22px; font-weight: 700; text-align: center; letter-spacing: 0.05em; color: #f0c8f8; }
.sub { font-size: 13px; color: var(--muted); text-align: center; margin-top: 4px; }
.rarities { display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; }
.rpill { font-size: 10px; padding: 2px 9px; border-radius: 99px; font-weight: 700; }
.rpill.common    { background:#0e2a1e; color:var(--common); border:1px solid var(--common); }
.rpill.rare      { background:#0a1a38; color:var(--rare); border:1px solid var(--rare); }
.rpill.epic      { background:#240a44; color:var(--epic); border:1px solid var(--epic); }
.rpill.legendary { background:#2e1800; color:var(--legendary); border:1px solid var(--legendary); }
.rpill.mythic    { background:#2a0828; color:var(--mythic); border:1px solid var(--mythic); }
.card-area {
  width:280px; height:340px; position:relative; display:flex;
  align-items:center; justify-content:center;
  perspective: 1000px;
}
.card-back {
  width:260px; height:320px; border-radius:20px;
  background: linear-gradient(145deg, #240f40, #180830);
  border:1px solid #7a3aaa;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px;
  cursor:pointer; transition:border-color 0.2s, box-shadow 0.2s; position:absolute;
  transform-origin: center;
  box-shadow: 0 0 18px #9933cc22, inset 0 0 20px #2a0a4a18;
}
.card-back:hover { border-color:#cc66ff; box-shadow: 0 0 24px #cc44ff44; }
.card-back:active { transform:scale(0.97); }
.card-back.flipping {
  animation: flipOut 0.32s cubic-bezier(.55,.055,.675,.19) forwards;
  pointer-events: none;
}
@keyframes flipOut {
  0%   { transform: rotateY(0deg) scale(1); opacity:1; }
  100% { transform: rotateY(-90deg) scale(0.85); opacity:0; }
}
.card {
  width:260px; height:320px; border-radius:20px;
  background: linear-gradient(145deg, #240f40, #180830);
  border:1px solid var(--card-border);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:10px; padding:1.5rem; position:absolute; opacity:0;
  transform: rotateY(90deg) scale(0.85);
  transform-origin: center;
}
.card.reveal { animation: flipIn 0.42s cubic-bezier(.34,1.4,.64,1) forwards; }
@keyframes flipIn {
  from { opacity:0; transform: rotateY(90deg) scale(0.85); }
  to   { opacity:1; transform: rotateY(0deg) scale(1); }
}
.card.mythic-card  { background: linear-gradient(145deg,#2a0040,#1a0030); border:1.5px solid var(--mythic); box-shadow:0 0 28px 6px #ff44cc44, 0 0 60px 12px #aa00cc22, inset 0 0 30px #33004488; }
.card.legendary-card { background: linear-gradient(145deg,#2a1800,#1e1030); border:1.5px solid var(--legendary); box-shadow:0 0 20px 3px #ffcc4430; }
.card.epic-card  { background: linear-gradient(145deg,#280a48,#1a0830); border:1.5px solid var(--epic); box-shadow:0 0 16px 2px #cc44ff22; }
.card.rare-card  { background: linear-gradient(145deg,#0e1a3a,#180830); border:1.5px solid var(--rare); }
.creature-circle { width:110px; height:110px; border-radius:50%; background:#2a1248; border:1px solid #7a3aaa; display:flex; align-items:center; justify-content:center; font-size:60px; flex-shrink:0; }
.mythic-card .creature-circle    { background:#350048; border-color:var(--mythic); box-shadow:0 0 20px #ff44cc88; filter:drop-shadow(0 0 10px #ff70cc); }
.legendary-card .creature-circle { border-color:var(--legendary); background:#2a1800; }
.epic-card .creature-circle      { border-color:var(--epic); background:#280a40; }
.rare-card .creature-circle      { border-color:var(--rare); background:#0a1430; }
.name { font-size:17px; font-weight:700; color:var(--text); text-align:center; }
.mythic-card .name    { color:#ffaaee; text-shadow:0 0 10px #ff44cc, 0 0 24px #cc00aa; }
.legendary-card .name { color:var(--legendary); }
.epic-card .name      { color:#e8b8ff; }
.rare-card .name      { color:#b8d8ff; }
.desc { font-size:12px; color:var(--muted); text-align:center; line-height:1.6; }
.mythic-card .desc    { color:#f0aaff; }
.legendary-card .desc { color:#ffd890; }
.epic-card .desc      { color:#d4aaff; }
.badge { font-size:10px; padding:3px 12px; border-radius:99px; font-weight:700; letter-spacing:0.04em; }
.badge.common    { background:#0e2a1e; color:var(--common); border:1px solid var(--common); }
.badge.rare      { background:#0a1a38; color:var(--rare); border:1px solid var(--rare); }
.badge.epic      { background:#240a44; color:var(--epic); border:1px solid var(--epic); }
.badge.legendary { background:#2e1800; color:var(--legendary); border:1px solid var(--legendary); }
.badge.mythic    { background:#2a0828; color:var(--mythic); border:1px solid var(--mythic); text-shadow:0 0 8px #ff44cc; box-shadow:0 0 10px #ff44cc33; }
.btn { padding:12px 30px; border-radius:12px; border:1px solid #7a3aaa; background:#240f40; color:var(--text); font-size:14px; font-weight:600; cursor:pointer; font-family:'Nunito',sans-serif; transition:all 0.15s; }
.btn:hover { background:#341460; border-color:#cc66ff; box-shadow:0 0 12px #cc44ff33; }
.btn:active { transform:scale(0.97); }
.hint { font-size:12px; color:var(--muted); text-align:center; }
.counter { font-size:11px; color:#8a5aaa; text-align:center; max-width:320px; }
.neon-scan { position:absolute; width:100%; height:2px; background:linear-gradient(90deg,transparent,#ff70cc99,transparent); animation:scan 2s linear infinite; top:0; left:0; border-radius:20px; pointer-events:none; }
@keyframes scan { 0%{top:0;opacity:0.8;}50%{opacity:1;}100%{top:100%;opacity:0;} }

/* Screen shake */
@keyframes screenShake {
  0%,100% { transform: translate(0,0) rotate(0deg); }
  10% { transform: translate(-7px,-4px) rotate(-0.4deg); }
  20% { transform: translate(6px,4px) rotate(0.4deg); }
  30% { transform: translate(-5px,6px) rotate(-0.3deg); }
  40% { transform: translate(6px,-5px) rotate(0.3deg); }
  50% { transform: translate(-7px,4px) rotate(-0.4deg); }
  60% { transform: translate(6px,-4px) rotate(0.4deg); }
  70% { transform: translate(-4px,4px) rotate(-0.3deg); }
  80% { transform: translate(4px,5px) rotate(0.2deg); }
  90% { transform: translate(-4px,-3px) rotate(-0.2deg); }
}
body.shaking { animation: screenShake 0.55s ease-in-out; }
</style>
</head>

<h1>✦ Pusheen Shop ✦</h1>
<p class="sub">Какое существо выберет тебя? 🌑</p>

<div class="card-area" id="cardArea">

  </div>
  <div class="card" id="resultCard">

    <div class="name" id="adoptName"></div>
    <div class="desc" id="adoptDesc"></div>
    <span class="badge" id="adoptRarity"></span>
  </div>
</div>
<div style="display:flex;gap:10px;align-items:center">
  <button class="btn" id="againBtn" style="display:none" onclick="reset()">ещё раз</button>
  <button class="btn" id="rollBtn" onclick="reveal()">призвать 🌑</button>
</div>
<p class="hint" id="hintText">100 мистических существ · 5 уровней силы</p>
<p class="counter" id="counter"></p>

  {e:"🐲",n:"Первородный дракон",d:"Старше самого времени.\nДышит не огнём — вечностью.",r:"legendary"},
  {e:"🌌",n:"Межзвёздный зверь",d:"Тело из тёмной материи.\nВидит конец вселенной.",r:"legendary"},
  {e:"⭐",n:"Живая звезда",d:"Упала с неба и выжила.\nТеперь ищет путь домой.",r:"legendary"},
  {e:"🌊",n:"Древний Левиафан",d:"Создал океаны своим дыханием.\nМожет забрать их обратно.",r:"legendary"},
  {e:"🔥",n:"Феникс-отец",d:"Умирал тысячи раз.\nКаждый раз возвращается сильнее.",r:"legendary"},
  {e:"🌑",n:"Пожиратель лун",d:"Съедает луны для силы.\nПоэтому бывают затмения.",r:"legendary"},
  {e:"👁",n:"Древний Глаз",d:"Существует до богов.\nВидел их рождение и смерть.",r:"legendary"},
  {e:"🦅",n:"Симург",d:"Живёт на горе между мирами.\nЗнает все имена всех вещей.",r:"legendary"},
  {e:"☄️",n:"Странник-комета",d:"Летит с начала вселенной.\nДостигнет цели после её конца.",r:"legendary"},
  {e:"✨",n:"Первозданный",d:"Существовал до существования.\nСоздал пустоту из которой всё.",r:"mythic"},
  {e:"🌌",n:"Пустота-разум",d:"Нет формы — нет тела.\nПросто есть. И этого достаточно.",r:"mythic"},
  {e:"💫",n:"Пушин Богов",d:"Появляется раз в вечность.\nЕсли видишь его — ты избран.\nИли проклят.",r:"mythic"},
];
const rarityLabel={common:"обычный",rare:"редкий",epic:"★ эпик",legendary:"✦ легендарный",mythic:"✦✦ мистик"};
const weights={common:40,rare:30,epic:18,legendary:9,mythic:3};
let rolls=0,revealed=false,stats={common:0,rare:0,epic:0,legendary:0,mythic:0};

function weightedPick(){
  const total=Object.values(weights).reduce((a,b)=>a+b,0);
  let r=Math.random()*total;
  for(const rarity in weights){r-=weights[rarity];if(r<=0){const pool=adopts.filter(a=>a.r===rarity);return pool[Math.floor(Math.random()*pool.length)];}}
  return adopts[0];
}

function playRevealSound(rarity) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const now = ctx.currentTime;

    // Whoosh sweep
    const sweep = ctx.createOscillator();
    const sweepGain = ctx.createGain();
    sweep.connect(sweepGain); sweepGain.connect(ctx.destination);
    sweep.type = 'sawtooth';
    sweep.frequency.setValueAtTime(80, now);
    sweep.frequency.exponentialRampToValueAtTime(500, now + 0.28);
    sweepGain.gain.setValueAtTime(0.12, now);
    sweepGain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
    sweep.start(now); sweep.stop(now + 0.35);

    // Bass hit for high rarities
    if (rarity === 'mythic' || rarity === 'legendary') {
      const bass = ctx.createOscillator();
      const bg = ctx.createGain();
      bass.connect(bg); bg.connect(ctx.destination);
      bass.type = 'sine';
      bass.frequency.setValueAtTime(55, now + 0.28);
      bass.frequency.exponentialRampToValueAtTime(28, now + 0.9);
      bg.gain.setValueAtTime(0.45, now + 0.28);
      bg.gain.exponentialRampToValueAtTime(0.001, now + 0.9);
      bass.start(now + 0.28); bass.stop(now + 0.9);
    }

    // Melodic chime sequence
    const noteMap = {
      common:    [523, 659],
      rare:      [523, 659, 784],
      epic:      [523, 659, 784, 1047],
      legendary: [523, 659, 784, 1047, 1319],
      mythic:    [523, 659, 784, 1047, 1319, 1568],
    };
    const notes = noteMap[rarity] || noteMap.common;
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.connect(g); g.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      const t = now + 0.28 + i * 0.075;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.18, t + 0.04);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.45);
      osc.start(t); osc.stop(t + 0.5);
    });
  } catch(e) {}
}

function burstParticles(rarity) {
  const area = document.getElementById('cardArea');
  const rect = area.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;

  const canvas = document.createElement('canvas');
  canvas.style.cssText = 'position:fixed;top:0;left:0;pointer-events:none;z-index:9999;';
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  document.body.appendChild(canvas);
  const c = canvas.getContext('2d');

  const cfgs = {
    mythic:    { colors:['#ff44ff','#9900ff','#ffffff','#ff00cc','#cc00ff','#ff88ff'], count:130, speed:20 },
    legendary: { colors:['#f0a030','#ffcc44','#ffffff','#ff8800','#ffe080','#ffaa33'], count:90,  speed:17 },
    epic:      { colors:['#9d7ff0','#cc88ff','#ffffff','#7744ff','#e0ccff'],           count:65,  speed:14 },
    rare:      { colors:['#4a9eff','#88ccff','#ffffff','#2266ff','#aaddff'],           count:45,  speed:12 },
    common:    { colors:['#4caf80','#88ddaa','#ffffff','#aaffcc'],                     count:28,  speed:10 },
  };
  const cfg = cfgs[rarity] || cfgs.common;

  const particles = [];
  for (let i = 0; i < cfg.count; i++) {
    const angle = (Math.PI * 2 * i / cfg.count) + (Math.random() - 0.5) * 0.8;
    const speed = cfg.speed * (0.35 + Math.random() * 0.9);
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      size: 2.5 + Math.random() * 5.5,
      color: cfg.colors[Math.floor(Math.random() * cfg.colors.length)],
      life: 1,
      decay: 0.011 + Math.random() * 0.016,
      gravity: 0.22,
    });
  }

  function draw() {
    c.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    for (const p of particles) {
      if (p.life <= 0) continue;
      alive = true;
      p.x += p.vx;
      p.y += p.vy;
      p.vy += p.gravity;
      p.vx *= 0.975;
      p.life -= p.decay;
      const r = p.size * p.life;
      c.globalAlpha = p.life;
      c.shadowColor = p.color;
      c.shadowBlur = r * 3.5;
      c.fillStyle = p.color;
      c.beginPath();
      c.arc(p.x, p.y, r * 0.6, 0, Math.PI * 2);
      c.fill();
    }
    c.globalAlpha = 1;
    c.shadowBlur = 0;
    if (alive) requestAnimationFrame(draw);
    else canvas.remove();
  }
  requestAnimationFrame(draw);
}

function reveal(){
  if(revealed)return;
  revealed=true;
  rolls++;
  const adopt=weightedPick();
  stats[adopt.r]++;

  // Prepare result card content
  document.getElementById("adoptEmoji").textContent=adopt.e;
  document.getElementById("adoptName").textContent=adopt.n;
  document.getElementById("adoptDesc").textContent=adopt.d;
  const rar=document.getElementById("adoptRarity");
  rar.textContent=rarityLabel[adopt.r];
  rar.className="badge "+adopt.r;
  const card=document.getElementById("resultCard");
  card.className="card";
  if(adopt.r==="mythic")card.classList.add("mythic-card");
  else if(adopt.r==="legendary")card.classList.add("legendary-card");
  else if(adopt.r==="epic")card.classList.add("epic-card");
  else if(adopt.r==="rare")card.classList.add("rare-card");

  // Sound + flip-out animation start simultaneously
  playRevealSound(adopt.r);
  const cardBack=document.getElementById("cardBack");
  cardBack.classList.add("flipping");
  document.getElementById("rollBtn").style.display="none";

  // After card-back flips out, flip in result card
  setTimeout(()=>{
    cardBack.style.display="none";

    if(adopt.r==="mythic"){const s=document.createElement("div");s.className="neon-scan";card.appendChild(s);setTimeout(()=>s.remove(),4000);}

    card.classList.add("reveal");

    // Screen shake
    document.body.classList.add("shaking");
    document.body.addEventListener("animationend",()=>document.body.classList.remove("shaking"),{once:true});

    // Particle burst slightly after flip-in starts
    setTimeout(()=>burstParticles(adopt.r), 120);

  }, 310);

  setTimeout(()=>{
    document.getElementById("againBtn").style.display="inline-block";
    document.getElementById("hintText").textContent=adopt.r==="mythic"?"✦✦ МИСТИК. 3% шанс. Ты избран(а).":adopt.r==="legendary"?"✦ Легендарный! Невероятная удача!":adopt.r==="epic"?"★ Эпик! Очень редко!":"поделись с подругами 🐾";
    document.getElementById("counter").textContent=`роллов: ${rolls} · обычных: ${stats.common} · редких: ${stats.rare} · эпиков: ${stats.epic} · легенд: ${stats.legendary} · мистиков: ${stats.mythic}`;
  }, 750);
}

function reset(){
  revealed=false;
  const cardBack=document.getElementById("cardBack");
  cardBack.style.display="flex";
  cardBack.classList.remove("flipping");
  document.getElementById("rollBtn").style.display="inline-block";
  document.getElementById("resultCard").className="card";
  document.getElementById("againBtn").style.display="none";
  document.getElementById("hintText").textContent="100 мистических существ · 5 уровней силы";
}
</script>
